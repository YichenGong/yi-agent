# GitLab CI 配置
# push 到分支时在 Mac mini self-hosted runner 上跑
# MR 走云端 runner(不进 Mac mini,安全考虑)

stages:
  - check

variables:
  CARGO_TERM_COLOR: "always"

# 缓存 cargo registry(只读并发安全)和 target 目录(编译产物)
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - ~/.cargo/registry/
    - ~/.cargo/git/
    - ~/cargo-target/  # CARGO_TARGET_DIR 输出目录

# push 到分支时跑(Mac mini self-hosted)
ci-push:
  stage: check
  tags:
    - mac-mini
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  script:
    # 加载 rustup 环境(shell executor 非交互式不加载 .bashrc)
    - source "$HOME/.cargo/env" 2>/dev/null || true
    # rustup 缺失则自动安装(self-healing,兼容新 runner 用户)
    - command -v rustup >/dev/null 2>&1 || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
    - source "$HOME/.cargo/env"
    - export CARGO_TARGET_DIR="$HOME/cargo-target/gitlab"
    - mkdir -p "$CARGO_TARGET_DIR"
    - cd yi-agent-rs
    - rustup default stable
    - rustup update stable
    - just --version || cargo install just --locked --quiet
    - just ci

# MR(Merge Request)走云端 runner
ci-mr:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  image: rust:latest
  before_script:
    - cd yi-agent-rs
    - curl -sSf https://just.systems/install.sh | sh -s -- --to /usr/local/bin
  script:
    - just ci
