name: Release

# tag 推送时触发,跑在 Mac mini self-hosted runner
on:
  push:
    tags:
      - "v*.*.*"

# 防止误推两次 tag 时并发跑两个 release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: self-hosted  # Mac mini 上注册的 GitHub Actions runner
    permissions:
      contents: write  # softprops/action-gh-release 需要写权限创建 Release
    env:
      # 统一 PATH,所有 step 自动继承(self-hosted runner 非 interactive shell,默认 PATH 缺东西)
      PATH: /opt/homebrew/bin:/Users/agenticlabs/.local/bin:/Users/agenticlabs/.cargo/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      CARGO_TARGET_DIR: /Users/agenticlabs/cargo-target/github
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        id: version
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          CARGO_VERSION=$(grep '^version' yi-agent-rs/Cargo.toml | head -1 | awk -F'"' '{print $2}')
          if [ "v$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Git tag ($TAG_VERSION) does not match Cargo.toml version (v$CARGO_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"
          # 供后续 step 复用
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        run: |
          source "$HOME/.cargo/env"
          rustup default stable 2>/dev/null || true
          # 检测 target 是否已装,已装就跳过(避免每次 release 都联网检查)
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu; do
            if ! rustup target list --installed 2>/dev/null | grep -q "^$target$"; then
              rustup target add "$target"
            fi
          done
          rustup target list --installed

      - name: Ensure cargo-zigbuild installed
        run: |
          source "$HOME/.cargo/env"
          command -v cargo-zigbuild >/dev/null 2>&1 || cargo install cargo-zigbuild --locked

      - name: Ensure zig available
        run: |
          if ! command -v zig >/dev/null 2>&1; then
            echo "ERROR: zig not found. Install with: brew install zig"
            exit 1
          fi
          zig version

      - name: Ensure just installed
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! command -v just >/dev/null 2>&1; then
            curl -sSf https://just.systems/install.sh | sh -s -- --to "$HOME/.local/bin"
          fi
          just --version

      - name: Build & package all platforms
        working-directory: yi-agent-rs
        run: |
          source "$HOME/.cargo/env"
          just package-all

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yi-agent-rs/dist/*.tar.gz
            yi-agent-rs/dist/*.sha256
          generate_release_notes: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        working-directory: yi-agent-rs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: just npm-publish

      - name: Update Homebrew tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./.github/scripts/update-homebrew-tap.sh "${{ github.ref_name }}" "$VERSION"
