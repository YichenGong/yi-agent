<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yi-agent 配置</title>
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24283b;
    --surface-hover: #2f334d;
    --border: #3b4261;
    --text: #c0caf5;
    --text-dim: #565f89;
    --accent: #7aa2f7;
    --accent-hover: #89b4fa;
    --success: #9ece6a;
    --warning: #e0af68;
    --error: #f7768e;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .env-path {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
    padding: 0.5rem 0.75rem;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    word-break: break-all;
  }
  .env-example {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 1.5rem;
    padding: 0.4rem 0.75rem;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .env-example .label { margin-right: 0.4rem; }
  .env-example code {
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--accent);
    word-break: break-all;
  }
  .layout {
    display: flex;
    gap: 1.5rem;
    min-height: 400px;
  }
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .tab {
    padding: 0.6rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.9rem;
    text-align: left;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); border-color: var(--accent); }
  .tab.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--surface-hover);
  }
  .main {
    flex: 1;
    min-width: 0;
  }
  .group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .group h2 {
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section { margin-bottom: 1rem; }
  .section:last-child { margin-bottom: 0; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    padding: 0.5rem 0;
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 600;
    user-select: none;
  }
  .section-header:hover { color: var(--accent); }
  .section-arrow {
    display: inline-block;
    transition: transform 0.15s;
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .section.collapsed .section-arrow { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-body {
    padding-top: 0.5rem;
  }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 0.35rem;
  }
  .field .desc {
    font-family: -apple-system, sans-serif;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: normal;
  }
  .field input, .field select {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field input.modified, .field select.modified {
    border-color: var(--warning);
  }
  .secret-wrapper {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .secret-wrapper input { flex: 1; }
  .toggle-btn {
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.8rem;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--accent); }
  .actions {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 1rem 0;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .save-btn {
    padding: 0.6rem 2rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .save-btn:hover:not(:disabled) { background: var(--accent-hover); }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status {
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .status.unsaved { color: var(--warning); }
  .status.saved { color: var(--success); }
  .toast {
    position: fixed;
    top: 1rem;
    right: 1rem;
    padding: 0.75rem 1.25rem;
    background: var(--success);
    color: var(--bg);
    border-radius: var(--radius);
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: var(--error); }
</style>
</head>
<body>

<h1>yi-agent 配置</h1>
<div class="env-path" id="envPath">加载中...</div>
<div class="env-example" id="envExample" style="display:none;">
  <span class="label">模板:</span>
  <code id="envExamplePath"></code>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<div class="actions">
  <button class="save-btn" id="saveBtn" disabled>保存</button>
  <span class="status" id="status"></span>
</div>

<div class="toast" id="toast"></div>

<script>
  let allVars = [];
  let originalValues = {};
  let currentValues = {};
  let activeTab = 'Model Provider';
  let collapsedSections = { 'Provider Credentials': true };

  // 定义 sections：仅 Model Provider tab 使用
  const modelProviderSections = [
    { name: 'General', vars: ['YI_AGENT_PROVIDER', 'YI_AGENT_MODEL', 'YI_AGENT_MODEL_CONTEXT_LENGTH', 'MODEL_API_KEY', 'MODEL_API_URL'] },
    { name: 'Provider Credentials', dynamic: true },
  ];

  function getProviderCredentialVars(provider) {
    if (provider === 'openai') return ['OPENAI_API_KEY', 'OPENAI_BASE_URL'];
    return ['ANTHROPIC_API_KEY', 'ANTHROPIC_BASE_URL'];
  }

  async function loadConfig() {
    const resp = await fetch('/api/config');
    const data = await resp.json();
    document.getElementById('envPath').textContent = data.envPath;

    // 显示 .env.example 模板路径
    if (data.envExamplePath) {
      document.getElementById('envExamplePath').textContent = data.envExamplePath;
      document.getElementById('envExample').style.display = '';
    }

    // 扁平化所有变量
    allVars = [];
    for (const group of data.groups) {
      for (const v of group.vars) {
        allVars.push(v);
        originalValues[v.key] = v.value;
        currentValues[v.key] = v.value;
      }
    }

    renderSidebar();
    renderMain();
    updateSaveButton();
  }

  function renderSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';
    const tabs = ['Model Provider', 'Agent', 'Tools'];
    for (const tab of tabs) {
      const btn = document.createElement('button');
      btn.className = 'tab' + (tab === activeTab ? ' active' : '');
      btn.textContent = tab;
      btn.addEventListener('click', () => {
        activeTab = tab;
        renderSidebar();
        renderMain();
      });
      sidebar.appendChild(btn);
    }
  }

  function renderMain() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    if (activeTab === 'Model Provider') {
      renderModelProviderTab(main);
    } else {
      renderFlatTab(main, activeTab);
    }
  }

  function renderModelProviderTab(main) {
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.innerHTML = '<h2>Model Provider</h2>';

    for (const section of modelProviderSections) {
      const sectionEl = document.createElement('div');
      sectionEl.className = 'section' + (collapsedSections[section.name] ? ' collapsed' : '');
      sectionEl.dataset.section = section.name;

      const header = document.createElement('div');
      header.className = 'section-header';
      header.innerHTML = `<span class="section-arrow">▼</span> ${section.name}`;
      header.addEventListener('click', () => {
        collapsedSections[section.name] = !collapsedSections[section.name];
        sectionEl.classList.toggle('collapsed');
      });

      const body = document.createElement('div');
      body.className = 'section-body';

      let varsToRender;
      if (section.dynamic) {
        const provider = currentValues['YI_AGENT_PROVIDER'] || 'anthropic';
        varsToRender = getProviderCredentialVars(provider);
      } else {
        varsToRender = section.vars;
      }

      for (const key of varsToRender) {
        const v = allVars.find(x => x.key === key);
        if (v) renderField(body, v);
      }

      sectionEl.appendChild(header);
      sectionEl.appendChild(body);
      groupEl.appendChild(sectionEl);
    }

    main.appendChild(groupEl);
  }

  function renderFlatTab(main, tabName) {
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.innerHTML = `<h2>${tabName}</h2>`;

    for (const v of allVars) {
      if (v.group === tabName) {
        renderField(groupEl, v);
      }
    }

    main.appendChild(groupEl);
  }

  function renderField(container, v) {
    const field = document.createElement('div');
    field.className = 'field';

    const label = document.createElement('label');
    label.innerHTML = `${v.key} <span class="desc">${v.description}</span>`;

    let inputEl;
    const currentValue = currentValues[v.key] !== undefined ? currentValues[v.key] : v.value;
    if (v.type === 'select') {
      inputEl = document.createElement('select');
      for (const opt of v.options) {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        if (opt === currentValue) o.selected = true;
        inputEl.appendChild(o);
      }
    } else {
      inputEl = document.createElement('input');
      inputEl.type = v.type === 'secret' ? 'password' : (v.type === 'number' ? 'number' : 'text');
      inputEl.value = currentValue;
      inputEl.placeholder = v.default || '(none)';
    }

    inputEl.dataset.key = v.key;
    inputEl.dataset.type = v.type;
    inputEl.dataset.masked = v.masked;
    inputEl.addEventListener('input', onFieldChange);
    inputEl.addEventListener('change', onFieldChange);

    if (v.type === 'secret') {
      const wrapper = document.createElement('div');
      wrapper.className = 'secret-wrapper';

      inputEl.addEventListener('focus', () => {
        if (inputEl.dataset.masked === 'true' && inputEl.value.includes('***')) {
          inputEl.value = '';
          inputEl.dataset.masked = 'false';
        }
      });

      const toggle = document.createElement('button');
      toggle.className = 'toggle-btn';
      toggle.textContent = '显示';
      toggle.type = 'button';
      toggle.addEventListener('click', () => {
        if (inputEl.type === 'password') {
          inputEl.type = 'text';
          toggle.textContent = '隐藏';
        } else {
          inputEl.type = 'password';
          toggle.textContent = '显示';
        }
      });

      wrapper.appendChild(inputEl);
      wrapper.appendChild(toggle);
      field.appendChild(wrapper);
    } else {
      field.appendChild(inputEl);
    }

    field.insertBefore(label, field.firstChild);
    container.appendChild(field);
  }

  function onFieldChange(e) {
    const key = e.target.dataset.key;
    const newValue = e.target.value;
    currentValues[key] = newValue;

    const original = originalValues[key];
    if (newValue !== original) {
      e.target.classList.add('modified');
    } else {
      e.target.classList.remove('modified');
    }

    // 若 provider 变化，重渲染 Model Provider tab 的 credentials section
    if (key === 'YI_AGENT_PROVIDER') {
      renderMain();
    }

    updateSaveButton();
  }

  function updateSaveButton() {
    let hasChanges = false;
    for (const key in currentValues) {
      if (currentValues[key] !== originalValues[key]) {
        hasChanges = true;
        break;
      }
    }
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('status');
    btn.disabled = !hasChanges;
    if (hasChanges) {
      status.className = 'status unsaved';
      status.textContent = '有未保存的修改';
    } else {
      status.className = 'status';
      status.textContent = '';
    }
  }

  async function save() {
    const updates = [];
    for (const key in currentValues) {
      if (currentValues[key] !== originalValues[key]) {
        updates.push({ key, value: currentValues[key] });
      }
    }
    if (updates.length === 0) return;

    const resp = await fetch('/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ updates }),
    });

    if (resp.ok) {
      showToast('已保存', false);
      await loadConfig();
    } else {
      const data = await resp.json().catch(() => ({}));
      showToast(data.error || '保存失败', true);
    }
  }

  function showToast(msg, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toast.className = 'toast', 2500);
  }

  document.getElementById('saveBtn').addEventListener('click', save);
  loadConfig();
</script>

</body>
</html>
